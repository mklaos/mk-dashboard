<!DOCTYPE html>
<html>
<head>
  <base href="/mk-dashboard/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="MK Restaurants Sales Dashboard - Executive Mobile App">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MK Laos">
  <link rel="apple-touch-icon" href="icons/ios_180x180.png">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MK Laos Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #ffffff;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .loader-container {
      text-align: center;
      transition: opacity 0.5s ease-out;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 20px;
      animation: pulse 2s infinite ease-in-out;
    }
    .loader-text {
      color: #E53935;
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #E53935;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="loading-indicator" class="loader-container">
    <img src="icons/android_192x192.png" alt="MK Logo" class="logo">
    <div class="spinner"></div>
    <div class="loader-text">MK Restaurants Dashboard</div>
    <p style="color: #666; font-size: 14px;">ກຳລັງໂຫຼດລະບົບ...</p>
  </div>
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
  
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

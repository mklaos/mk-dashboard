name: mk_dashboard
description: "MK Restaurants Sales Dashboard - Executive Mobile App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  
  # Supabase client
  supabase_flutter: ^2.8.0
  
  # Charts
  fl_chart: ^0.70.0
  
  # State management
  provider: ^6.1.1
  
  # Date formatting
  intl: ^0.20.1
  
  # Environment variables
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/icon/app_icon.png
